version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - copyloopvar
    - depguard
    - durationcheck
    - forbidigo
    - gocheckcompilerdirectives
    - gocritic
    - gosec
    - makezero
    - nilerr
    - nolintlint
    - reassign
    - sqlclosecheck
    - unconvert
  settings:
    govet:
      # The govet "inline" analyzer (golangci-lint v2.12.2) emits false
      # positives such as "Constant reflect.Ptr should be inlined" on
      # pre-existing code; disable it to preserve the prior lint baseline.
      disable:
        - inline
    staticcheck:
      # golangci-lint v2 staticcheck absorbed stylecheck (ST*) and quickfix (QF*),
      # neither of which was enforced under the v1.64.8 ruleset this repo was
      # linted against. Keep the effective v1 staticcheck behaviour.
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1007
        - -QF1008
        - -QF1012
        - -S1009
    gosec:
      # G101/G118/G202/G703/G705 are gosec findings the v2 ruleset reports on
      # pre-existing code that v1.64.8 did not; preserve the prior lint baseline.
      excludes:
        - G101
        - G118
        - G202
        - G703
        - G705
    depguard:
      rules:
        main:
          deny:
            - pkg: go.uber.org/zap
              desc: Do not use Uber zap, use slog instead
            - pkg: github.com/pkg/errors
              desc: Should be replaced by standard lib errors package
    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|print|println)$
        - pattern: ^(fmt\.Fprint(|f|ln)|print|println)$
        - pattern: ^zap\.Error$
        - pattern: ^grpc\.(Header|Trailer)$
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - assignOp
        - commentFormatting
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # The gosec excludes above orphan pre-existing //nolint:gosec source
      # directives; do not let nolintlint flag them as unused.
      - linters:
          - nolintlint
        source: //nolint:gosec
    paths:
      - scripts/mockserver
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
